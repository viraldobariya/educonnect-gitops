apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend-deployment
  namespace: backend

spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
        # - image: "viraldobariya33/edu-backend:1.2.0"
          name: "backend-container"
          ports:S
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: sm-backend-secret
            - secretRef:
                name: ps-backend-secret